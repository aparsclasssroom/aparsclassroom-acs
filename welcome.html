<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ACS Welcome</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg,#0f172a,#1e3a8a,#0ea5e9);
  color:white;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  box-sizing:border-box;
}

.card {
  width:350px;
  max-width:95%;
  text-align:center;
  background:rgba(0,0,0,0.35);
  padding:30px;
  border-radius:20px;
  backdrop-filter: blur(10px);
  box-shadow:0 0 25px rgba(0,0,0,0.5);
}

.btn {
  margin-top:20px;
  padding:14px;
  background:#22c55e;
  border:none;
  color:white;
  font-size:16px;
  border-radius:10px;
  cursor:pointer;
  width:100%;
}

.scroll-box {
  margin-top:15px;
  overflow:hidden;
  white-space:nowrap;
  background:rgba(255,255,255,0.12);
  padding:10px;
  border-radius:10px;
}

.scroll-text {
  display:inline-block;
  padding-left:100%;
  font-family:'Noto Sans Bengali', sans-serif;
  font-size:14px;
  font-weight:600;
  animation: scrollLeft 25s linear infinite;
}

@keyframes scrollLeft {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}
</style>

</head>

<body>

<div class="card">

  <h2>Welcome to ACS</h2>

  <div class="scroll-box">
    <div class="scroll-text">
      ⚡ ACS-এ আপনাকে স্বাগতম |আপনার ফোনে একটি মেসেজ পাঠানো হবে।সেখানে থাকা ১০ টি কোডের একটি আপনার কোডের সাথে মিলে  গেলে আপনি পাবেন এসিএস এর একটি ইঞ্জিনিয়ারিং প্রশ্ন ব্যাংক।বিস্তারিত ফেসবুকে।⚡
    </div>
  </div>

  <h3>Your Code</h3>
  <h1 id="code">Loading...</h1>

  <h3 id="timer">Loading...</h3>

  <button class="btn" onclick="joinClass()">
    JOIN CLASS
  </button>

</div>

<script>

/* SHOW USER CODE */
document.getElementById("code").innerText =
  localStorage.getItem("userCode") || "ACS000000";

/* 🔥 FIXED START TIME (BD TIME SAFE) */
const start = new Date("2026-04-17T21:52:00+06:00"); // 9:52 PM BD
const duration = 13 * 60 * 60 * 1000; // 13 hours

const END_TIME = start.getTime() + duration;

function updateTimer() {

  const now = Date.now();

  if (now < start.getTime()) {
    document.getElementById("timer").innerText = "STARTS AT 9:52 PM";
    setTimeout(updateTimer, 1000);
    return;
  }

  const left = END_TIME - now;

  if (left <= 0) {
    document.getElementById("timer").innerText = "EXPIRED";
    return;
  }

  const h = Math.floor(left / 3600000);
  const m = Math.floor((left % 3600000) / 60000);
  const s = Math.floor((left % 60000) / 1000);

  document.getElementById("timer").innerText =
    h + "h " + m + "m " + s + "s";

  setTimeout(updateTimer, 1000);
}

updateTimer();

/* JOIN BUTTON */
function joinClass() {
  window.location.href =
    "https://aparsclassroom.com/shop/dashboard/login";
}

</script>

</body>
</html>
